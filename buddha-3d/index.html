<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotus Bodhicitta System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #05070a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        /* Collapsible UI Menu Control Panel */
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(10, 15, 25, 0.8);
            padding: 12px 16px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 280px;
            pointer-events: auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }
        #ui-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        h1 {
            font-size: 15px;
            margin: 0;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        #ui-toggle-btn {
            background: none;
            border: none;
            color: #ffd700;
            font-size: 12px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.3s ease;
        }
        #ui-content {
            margin-top: 12px;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 400px;
            opacity: 1;
        }
        /* Collapsed State Styles */
        #ui-container.collapsed {
            width: 220px;
        }
        #ui-container.collapsed #ui-toggle-btn {
            transform: rotate(-90deg);
        }
        #ui-container.collapsed #ui-content {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* Control Group Styling */
        p {
            font-size: 11px;
            color: #aaa;
            margin: 0 0 12px 0;
            line-height: 1.4;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: block;
            font-size: 10px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select, input[type="range"] {
            width: 100%;
            background: #141a24;
            border: 1px solid #253043;
            color: #fff;
            padding: 6px;
            border-radius: 6px;
            outline: none;
            box-sizing: border-box;
            font-size: 11px;
        }

        /* Interactive Click Popup Card */
        #popup-card {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: rgba(10, 15, 25, 0.92);
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 16px;
            padding: 16px 20px;
            width: 85%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        #popup-card.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        #popup-close {
            position: absolute;
            top: 10px;
            right: 12px;
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        #popup-title {
            color: #ffd700;
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 6px;
        }
        .popup-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .popup-label {
            color: #77849a;
        }
        .popup-val {
            font-weight: 500;
            color: #fff;
        }

        /* Sacred Mantra Styling Block */
        .popup-mantra-section {
            margin-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 10px;
        }
        .popup-mantra-val {
            font-family: Georgia, Cambria, "Times New Roman", Times, serif;
            font-style: italic;
            font-size: 12.5px;
            line-height: 1.55;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.04);
            border-left: 2px solid #ffd700;
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            letter-spacing: 0.3px;
            white-space: pre-line;
        }

        /* Loading Screen Overlay */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #05070a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.6s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 215, 0, 0.1);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading-text {
            margin-top: 16px;
            color: #ffd700;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Mobile Layout Adaptations */
        @media (max-width: 600px) {
            #ui-container {
                width: calc(100% - 30px);
                max-width: none;
                top: 10px;
                left: 10px;
            }
            #ui-container.collapsed {
                width: calc(100% - 30px);
            }
        }
    </style>
    <!-- Three.js components -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Calibrating Lotus Bodhicitta System...</div>
    </div>

    <div id="canvas-container"></div>

    <!-- Collapsible UI Control Panel (Defaults to Collapsed) -->
    <div id="ui-container" class="collapsed">
        <div id="ui-header">
            <h1>Lotus Bodhicitta</h1>
            <button id="ui-toggle-btn">▼</button>
        </div>
        <div id="ui-content">
            <p>Interactive meditation matrix displaying the Buddha's core and the 13 Siddham axial spheres.</p>
            
            <div class="control-group">
                <label>Character Render Mode</label>
                <select id="billboard-mode">
                    <option value="rotate" selected>Rotate in 3D Space</option>
                    <option value="billboard">Face Camera (Billboard)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Auto-Rotation Speed (RPM)</label>
                <!-- Default value set to 1.0 (exactly 1 Rotation Per Minute) -->
                <input type="range" id="rotation-speed" min="0" max="5" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label>Core Glow Intensity</label>
                <input type="range" id="glow-intensity" min="0" max="3" step="0.1" value="1.5">
            </div>
        </div>
    </div>

    <!-- Popup Info Card for Click Interactivity -->
    <div id="popup-card">
        <button id="popup-close">&times;</button>
        <div id="popup-title">Sphere Details</div>
        <div class="popup-row">
            <span class="popup-label">Location:</span>
            <span class="popup-val" id="popup-name">-</span>
        </div>
        <div class="popup-row">
            <span class="popup-label">Chakra Center:</span>
            <span class="popup-val" id="popup-chakra">-</span>
        </div>
        <div class="popup-row">
            <span class="popup-label">Siddham Glyph:</span>
            <span class="popup-val" id="popup-glyph">-</span>
        </div>
        <div class="popup-row">
            <span class="popup-label">Excel Coordinates:</span>
            <span class="popup-val" id="popup-coords">-</span>
        </div>
        <!-- Mantra Section -->
        <div class="popup-mantra-section">
            <div class="popup-label" style="margin-bottom: 6px; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">Sacred Mantra:</div>
            <div class="popup-mantra-val" id="popup-mantra">-</div>
        </div>
    </div>

    <script>
        // --- 1. Coordinate, Asset & Mantra Data Mapping ---
        const sphereData = [
            { 
                name: "Center Core", 
                excelPos: [0.0, 0.0, 0.0], 
                chakra: "Solar Plexus Chakra", 
                image: "04_CA_Gold.PNG", 
                char: "𑖓", 
                phonetic: "Ca",
                mantra: `Di Li Shai Ni No 
 Om, Di Shr Di Re, 
 Du Wei Ning Du Ti, 
 So To Ye, 
 Hum Pan Ja`
            },
            { 
                name: "Top Outer", 
                excelPos: [0.0, 0.0, 2.0], 
                chakra: "N/A", 
                image: "08_BA_Gold.PNG", 
                char: "𑖤", 
                phonetic: "Ba",
                mantra: `Shr Fo La Ye 
 Om, Du Bi Jya Ye Du Bi, 
 Bo La Wa Li Ning 
 So Po He.`
            },
            { 
                name: "Top Inner", 
                excelPos: [0.0, 0.0, 1.0], 
                chakra: "Crown Chakra", 
                image: "16_SA_Gold.PNG", 
                char: "𑖭", 
                phonetic: "Sa",
                mantra: `Su Lu Su Lu 
 Om, Su Lu Su Lu, 
 Bo La Su Lu, Bo La Su Lu, 
 Su Lu Su Lu Ye, 
 So Po He`
            },
            { 
                name: "Bottom Inner", 
                excelPos: [0.0, 0.0, -1.0], 
                chakra: "Root Chakra", 
                image: "13_YA_Gold.PNG", 
                char: "𑖧", 
                phonetic: "Ya",
                mantra: `Syi To Yu Yi, Shr Pan La Ye 
 Om, Wa Dz La, 
 Bo Shr Jye Li, 
 Jye Nang Syin La Hum`
            },
            { 
                name: "Bottom Outer", 
                excelPos: [0.0, 0.0, -2.0], 
                chakra: "N/A", 
                image: "09_DDA_Gold.PNG", 
                char: "𑖚", 
                phonetic: "Dda",
                mantra: `Du Lu Du Lu 
 Om, Su Syi Di Jya Li 
 So Po He`
            },
            { 
                name: "Left Outer", 
                excelPos: [-2.0, 0.0, 0.0], 
                chakra: "N/A", 
                image: "08_BA_Gold.PNG", 
                char: "𑖤", 
                phonetic: "Ba",
                mantra: `Shr Fo La Ye 
 Om, Du Bi Jya Ye Du Bi, 
 Bo La Wa Li Ning 
 So Po He.`
            },
            { 
                name: "Left Inner", 
                excelPos: [-1.0, 0.0, 0.0], 
                chakra: "N/A", 
                image: "19_THA_Gold.PNG", 
                char: "𑖞", 
                phonetic: "Tha",
                mantra: `Li To Yun 
 Om, Jr Li Jr Li, 
 Wa Dz La, 
 Bu La Pan To, 
 Hum Pan Ja`
            },
            { 
                name: "Right Inner", 
                excelPos: [1.0, 0.0, 0.0], 
                chakra: "N/A", 
                image: "21_SVA_Gold.PNG", 
                char: "𑖭𑖿𑖪", 
                phonetic: "Sva",
                mantra: `Fo La She Ye 
 Om, Sa La Sa La, 
 Wa Dz La, Jya La, 
 Hum Pan Ja`
            },
            { 
                name: "Right Outer", 
                excelPos: [2.0, 0.0, 0.0], 
                chakra: "N/A", 
                image: "09_DDA_Gold.PNG", 
                char: "𑖚", 
                phonetic: "Dda",
                mantra: `Du Lu Du Lu 
 Om, Su Syi Di Jya Li 
 So Po He`
            },
            { 
                name: "Back Outer", 
                excelPos: [0.0, 2.0, 0.0], 
                chakra: "N/A", 
                image: "09_DDA_Gold.PNG", 
                char: "𑖚", 
                phonetic: "Dda",
                mantra: `Du Lu Du Lu 
 Om, Su Syi Di Jya Li 
 So Po He`
            },
            { 
                name: "Back Inner", 
                excelPos: [0.0, 1.0, 0.0], 
                chakra: "N/A", 
                image: "25_KSA_Gold.PNG", 
                char: "𑖎𑖿𑖬", 
                phonetic: "Ksa",
                mantra: `Bo To Mo Jye Syi To Ye 
 Om, Shang Jye Li, 
 So Po He`
            },
            { 
                name: "Front Inner", 
                excelPos: [0.0, -1.0, 0.0], 
                chakra: "N/A", 
                image: "18_GA_Gold.PNG", 
                char: "𑖐", 
                phonetic: "Ga",
                mantra: `Jye meng 
 Om, Wa Dz La, 
 Wei La Ye, 
 So Po He`
            },
            { 
                name: "Front Outer", 
                excelPos: [0.0, -2.0, 0.0], 
                chakra: "N/A", 
                image: "08_BA_Gold.PNG", 
                char: "𑖤", 
                phonetic: "Ba",
                mantra: `Shr Fo La Ye 
 Om, Du Bi Jya Ye Du Bi, 
 Bo La Wa Li Ning 
 So Po He.`
            }
        ];

        // --- 2. Setup Scene, Camera, and Renderer ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x05070a, 0.05);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(3.5, 2.5, 5.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 12;
        controls.minDistance = 2;

        // --- 3. Procedural Studio Environment Map ---
        function createStudioEnvMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#101622');
            grad.addColorStop(0.5, '#05070a');
            grad.addColorStop(1, '#020305');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(40, 20, 30, 40);
            ctx.fillRect(180, 40, 40, 30);

            const texture = new THREE.CanvasTexture(canvas);
            texture.mapping = THREE.EquirectangularReflectionMapping;
            return texture;
        }
        scene.environment = createStudioEnvMap();

        // --- 4. Studio Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
        scene.add(ambientLight);

        const keyLight = new THREE.DirectionalLight(0xfff5e6, 2.0);
        keyLight.position.set(5, 8, 5);
        keyLight.castShadow = true;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xdbe9ff, 1.0);
        fillLight.position.set(-5, 3, -5);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xffffff, 1.5);
        rimLight.position.set(0, -5, 0);
        scene.add(rimLight);

        const coreLight = new THREE.PointLight(0x00aaff, 2.0, 5); 
        coreLight.position.set(0, 0, 0);
        scene.add(coreLight);

        // --- 5. Materials Setup ---
        const privacyBlueGlass = new THREE.MeshPhysicalMaterial({
            color: 0x88ddff,             
            emissive: 0x0044aa,          
            emissiveIntensity: 0.4,      
            roughness: 0.5,              
            metalness: 0.1,
            transmission: 0.75,          
            ior: 1.5,                    
            thickness: 1.8,              
            transparent: true,
            opacity: 1.0,
            side: THREE.DoubleSide,
            depthWrite: false
        });

        const clearBubbleGlass = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            roughness: 0.05,
            metalness: 0.1,
            transmission: 0.98,
            ior: 1.52,
            thickness: 0.3,
            transparent: true,
            opacity: 1.0,
            side: THREE.DoubleSide,
            depthWrite: false
        });

        // --- 6. Creating the Outer Bubble ---
        const outerBubbleGeo = new THREE.SphereGeometry(2.1, 64, 64);
        const outerBubble = new THREE.Mesh(outerBubbleGeo, clearBubbleGlass);
        scene.add(outerBubble);

        // --- 7. Loading the 3D Buddha Model ---
        const buddhaGroup = new THREE.Group();
        scene.add(buddhaGroup);

        const loader = new THREE.GLTFLoader();
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        const MODEL_URL = 'glass+buddha+statue+3d+model.glb'; 

        loader.load(MODEL_URL, 
            function(gltf) {
                const buddhaMesh = gltf.scene;
                
                buddhaMesh.traverse((node) => {
                    if (node.isMesh) {
                        node.material = privacyBlueGlass; 
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                
                buddhaMesh.scale.set(1.4, 1.4, 1.4); 
                buddhaMesh.position.set(0.0, -0.5, -0.18); 
                buddhaMesh.rotation.y = Math.PI / 2; 
                
                buddhaGroup.add(buddhaMesh);
                
                loadingOverlay.style.opacity = 0;
                setTimeout(() => { loadingOverlay.style.display = 'none'; }, 600);
            },
            function (xhr) {
                if (xhr.total > 0) {
                    const percent = Math.round((xhr.loaded / xhr.total) * 100);
                    loadingText.innerText = `Calibrating Bodhicitta Matrix (${percent}%)`;
                }
            },
            function(err) {
                console.warn("Could not find local GLB model. Generating procedural frosted glass fallback.", err);
                loadingText.innerText = "Initializing Fallback System...";
                
                const fallbackGroup = new THREE.Group();
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), privacyBlueGlass);
                head.position.y = 0.55;
                fallbackGroup.add(head);

                const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.28, 0.65, 32), privacyBlueGlass);
                torso.position.y = 0.1;
                fallbackGroup.add(torso);

                const legs = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.12, 16, 100), privacyBlueGlass);
                legs.rotation.x = Math.PI / 2;
                legs.position.y = -0.25;
                fallbackGroup.add(legs);

                fallbackGroup.position.set(0.0, -0.5, -0.18);
                fallbackGroup.rotation.y = Math.PI / 2; 
                
                buddhaGroup.add(fallbackGroup);

                setTimeout(() => {
                    loadingOverlay.style.opacity = 0;
                    setTimeout(() => { loadingOverlay.style.display = 'none'; }, 600);
                }, 1000);
            }
        );

        // --- 8. Creating the 13 Spheres and Siddham Characters ---
        const spheresGroup = new THREE.Group();
        scene.add(spheresGroup);

        const characterPlanes = []; 
        const clickableSpheres = []; 
        const textureLoader = new THREE.TextureLoader();

        function createFallbackGlyphTexture(char, phonetic) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, 512, 512);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 25;
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 240px sans-serif';
            ctx.fillText(char, 256, 220);

            ctx.shadowBlur = 8;
            ctx.fillStyle = '#ffb90f';
            ctx.font = '600 48px sans-serif';
            ctx.fillText(phonetic.toUpperCase(), 256, 400);

            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        sphereData.forEach((data) => {
            const x = data.excelPos[0];
            const y = data.excelPos[2]; 
            const z = data.excelPos[1]; 
            const pos = new THREE.Vector3(x, y, z);

            const sphereGeo = new THREE.SphereGeometry(0.19, 32, 32);
            
            const sphere = new THREE.Mesh(sphereGeo, clearBubbleGlass.clone());
            sphere.position.copy(pos);
            sphere.userData = { 
                ...data,
                glow: 0.0 
            }; 
            spheresGroup.add(sphere);
            clickableSpheres.push(sphere);

            // REVISED: Plane size maximized to match the physical diameter (0.38) of the sphere
            const planeSize = 0.38; 
            const planeGeo = new THREE.PlaneGeometry(planeSize, planeSize);
            let characterTex = createFallbackGlyphTexture(data.char, data.phonetic);

            const charMaterial = new THREE.MeshBasicMaterial({
                map: characterTex,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            const plane = new THREE.Mesh(planeGeo, charMaterial);
            plane.position.copy(pos);
            spheresGroup.add(plane);

            textureLoader.load(
                data.image,
                (loadedTex) => {
                    loadedTex.colorSpace = THREE.SRGBColorSpace;
                    charMaterial.map = loadedTex;
                    charMaterial.needsUpdate = true;
                },
                undefined,
                () => {
                    console.log(`Using procedural high-fidelity gold texture for ${data.phonetic}`);
                }
            );

            characterPlanes.push({
                mesh: plane,
                initialPos: pos.clone(),
                offset: Math.random() * Math.PI * 2
            });
        });

        // --- 8b. Add 6 Laser Beams with Arrow Heads along the Axial Directions ---
        function createAxialLaserBeam(direction) {
            const beamGroup = new THREE.Group();

            const totalLength = 2.3;             
            const coneHeight = 0.15;             
            const cylinderLength = totalLength - coneHeight; 
            const cylinderRadius = 0.019;        
            const coneRadius = cylinderRadius * 2.2; 

            const mat = new THREE.MeshBasicMaterial({
                color: 0x00d2ff,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });

            const cylGeom = new THREE.CylinderGeometry(cylinderRadius, cylinderRadius, cylinderLength, 16);
            const shaft = new THREE.Mesh(cylGeom, mat);
            shaft.position.y = cylinderLength / 2;
            beamGroup.add(shaft);

            const coneGeom = new THREE.ConeGeometry(coneRadius, coneHeight, 16);
            const head = new THREE.Mesh(coneGeom, mat);
            head.position.y = cylinderLength + (coneHeight / 2);
            beamGroup.add(head);

            const up = new THREE.Vector3(0, 1, 0);
            beamGroup.quaternion.setFromUnitVectors(up, direction);

            return beamGroup;
        }

        const axialDirections = [
            new THREE.Vector3(1, 0, 0),   // +X (Right)
            new THREE.Vector3(-1, 0, 0),  // -X (Left)
            new THREE.Vector3(0, 1, 0),   // +Y (Up)
            new THREE.Vector3(0, -1, 0),  // -Y (Down)
            new THREE.Vector3(0, 0, 1),   // +Z (Back)
            new THREE.Vector3(0, 0, -1)   // -Z (Front)
        ];

        axialDirections.forEach((dir) => {
            const laser = createAxialLaserBeam(dir);
            spheresGroup.add(laser); 
        });

        // --- 9. Base Aesthetic Grid ---
        const gridHelper = new THREE.GridHelper(8, 32, 0x00aaff, 0x141a24); 
        gridHelper.position.y = -2.3;
        scene.add(gridHelper);

        // --- 10. Collapsible Menu Controls ---
        const uiContainer = document.getElementById('ui-container');
        const uiHeader = document.getElementById('ui-header');
        const uiToggleBtn = document.getElementById('ui-toggle-btn');

        uiHeader.addEventListener('click', () => {
            const isCollapsed = uiContainer.classList.toggle('collapsed');
            uiToggleBtn.innerText = isCollapsed ? '▼' : '▲';
        });

        // --- 11. Click Interactivity (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const popupCard = document.getElementById('popup-card');
        const popupName = document.getElementById('popup-name');
        const popupChakra = document.getElementById('popup-chakra');
        const popupGlyph = document.getElementById('popup-glyph');
        const popupCoords = document.getElementById('popup-coords');
        const popupMantra = document.getElementById('popup-mantra');
        let activeOutline = null;

        function showPopup(data) {
            popupName.innerText = data.name;
            popupChakra.innerText = data.chakra;
            popupGlyph.innerText = `${data.char} (${data.phonetic})`;
            popupCoords.innerText = `X: ${data.excelPos[0].toFixed(1)}, Y: ${data.excelPos[1].toFixed(1)}, Z: ${data.excelPos[2].toFixed(1)}`;
            popupMantra.textContent = data.mantra;
            popupCard.classList.add('active');
        }

        function hidePopup() {
            popupCard.classList.remove('active');
            removeHighlight();
        }

        function highlightSphere(sphere) {
            if (activeOutline) spheresGroup.remove(activeOutline);

            const outlineGeo = new THREE.SphereGeometry(0.21, 16, 16);
            const outlineMat = new THREE.MeshBasicMaterial({
                color: 0x00d2ff, 
                wireframe: true,
                transparent: true,
                opacity: 0.5
            });
            activeOutline = new THREE.Mesh(outlineGeo, outlineMat);
            activeOutline.position.copy(sphere.position);
            spheresGroup.add(activeOutline);
        }

        function removeHighlight() {
            if (activeOutline) {
                spheresGroup.remove(activeOutline);
                activeOutline = null;
            }
        }

        document.getElementById('popup-close').addEventListener('click', (e) => {
            e.stopPropagation();
            hidePopup();
        });

        function handlePointerDown(event) {
            if (event.target.closest('#ui-container') || event.target.closest('#popup-card')) return;

            const rect = renderer.domElement.getBoundingClientRect();
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;

            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(clickableSpheres);

            if (intersects.length > 0) {
                const targetSphere = intersects[0].object;
                showPopup(targetSphere.userData);
                highlightSphere(targetSphere);
            } else {
                hidePopup();
            }
        }

        window.addEventListener('pointerdown', handlePointerDown);

        // --- 12. UI Controls Binding ---
        const billboardModeSelect = document.getElementById('billboard-mode');
        const rotationSpeedInput = document.getElementById('rotation-speed');
        const glowIntensityInput = document.getElementById('glow-intensity');

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 13. Sequential Lighting Matrix Configuration ---
        const sequenceCoordinates = [
            [0.0, 0.0, -2.0], // 1. bottom outer
            [0.0, 0.0, -1.0], // 2. bottom inner
            [0.0, 0.0, 0.0],  // 3. center core
            [0.0, 0.0, 1.0],  // 4. top inner
            [0.0, 0.0, 2.0],  // 5. top outer
            [0.0, 2.0, 0.0],  // 6. back outer
            [0.0, 1.0, 0.0],  // 7. back inner
            [0.0, 0.0, 0.0],  // 8. center core
            [0.0, -1.0, 0.0], // 9. front inner
            [0.0, -2.0, 0.0], // 10. front outer
            [2.0, 0.0, 0.0],  // 11. right outer
            [1.0, 0.0, 0.0],  // 12. right inner
            [0.0, 0.0, 0.0],  // 13. center core
            [-1.0, 0.0, 0.0], // 14. left inner
            [-2.0, 0.0, 0.0]  // 15. left outer
        ];

        let currentSeqIndex = 0;
        let seqTimer = 0;
        const seqStepDuration = 1.2;    
        const seqPauseDuration = 3.0;   
        let isSeqPaused = false;

        function updateSequentialLighting(delta) {
            seqTimer += delta;
            const currentDuration = isSeqPaused ? seqPauseDuration : seqStepDuration;

            if (seqTimer >= currentDuration) {
                seqTimer = 0;
                if (isSeqPaused) {
                    isSeqPaused = false;
                    currentSeqIndex = 0; 
                } else {
                    currentSeqIndex++;
                    if (currentSeqIndex >= sequenceCoordinates.length) {
                        isSeqPaused = true;
                        currentSeqIndex = -1; 
                    }
                }
            }

            const activeCoords = (currentSeqIndex !== -1) ? sequenceCoordinates[currentSeqIndex] : null;

            clickableSpheres.forEach((sphere, index) => {
                const data = sphere.userData;
                const isTarget = activeCoords && 
                                 Math.abs(data.excelPos[0] - activeCoords[0]) < 0.01 &&
                                 Math.abs(data.excelPos[1] - activeCoords[1]) < 0.01 &&
                                 Math.abs(data.excelPos[2] - activeCoords[2]) < 0.01;

                const targetGlow = isTarget ? 1.0 : 0.0;
                sphere.userData.glow = THREE.MathUtils.lerp(sphere.userData.glow, targetGlow, 0.1);

                // 1. Smoothly scale sphere up on target activation
                const targetScale = 1.0 + (sphere.userData.glow * 0.4);
                sphere.scale.setScalar(targetScale);

                // 2. REVISED: Smoothly scale corresponding character plane matching base size 0.38
                const plane = characterPlanes[index].mesh;
                plane.scale.setScalar(0.38 * (1.0 + (sphere.userData.glow * 0.5)));

                // 3. Update individual sphere glass material characteristics
                if (sphere.userData.glow > 0.01) {
                    sphere.material.color.lerpColors(new THREE.Color(0xffffff), new THREE.Color(0x00ffcc), sphere.userData.glow);
                    sphere.material.emissive.lerpColors(new THREE.Color(0x000000), new THREE.Color(0x00aaff), sphere.userData.glow);
                    sphere.material.emissiveIntensity = sphere.userData.glow * 2.0;
                    sphere.material.roughness = 0.05 + (sphere.userData.glow * 0.35); 
                } else {
                    sphere.material.color.setHex(0xffffff);
                    sphere.material.emissive.setHex(0x000000);
                    sphere.material.emissiveIntensity = 0;
                    sphere.material.roughness = 0.05;
                }
            });
        }

        // --- 14. Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();
            
            const rpm = parseFloat(rotationSpeedInput.value);
            const rotSpeedRadPerSec = (rpm * Math.PI * 2) / 60;
            const rotationStep = rotSpeedRadPerSec * delta;

            // Smooth scene rotation - LOCKED TOGETHER AT AN IDENTICAL SPEED [1]
            spheresGroup.rotation.y += rotationStep;
            buddhaGroup.rotation.y += rotationStep; 

            // Update core breathing glow intensity (blue light)
            const glowVal = parseFloat(glowIntensityInput.value);
            coreLight.intensity = (Math.sin(elapsedTime * 2) * 0.3 + 1.0) * glowVal;

            // Run sequential lighting animation loop
            updateSequentialLighting(delta);

            // Character plane floating animations
            characterPlanes.forEach((item) => {
                const floatOffset = Math.sin(elapsedTime * 1.5 + item.offset) * 0.01;
                item.mesh.position.y = item.initialPos.y + floatOffset;

                if (billboardModeSelect.value === 'billboard') {
                    item.mesh.quaternion.copy(camera.quaternion);
                } else {
                    item.mesh.rotation.y = elapsedTime * 0.4 + item.offset;
                    item.mesh.rotation.x = 0;
                    item.mesh.rotation.z = 0;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
